name: Build msys2-runtime DLL

on:
  push:
    paths:
      - 'msys2-runtime/**'
      - '.github/workflows/build-msys2-runtime.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSYS2 (MSYS environment)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            base-devel
            git
            make
            patch
            gcc
            mingw-w64-cross-crt
            mingw-w64-cross-gcc
            mingw-w64-cross-zlib
            autotools
            gettext-devel
            libiconv-devel
            zlib-devel
            xmlto
            docbook-xsl
            cocom

      - name: Build msys2-runtime (split package)
        shell: msys2 {0}
        run: |
          cd msys2-runtime
          makepkg --noconfirm

          echo "Packaging split packages:"
          for d in pkg/*/; do
            name=$(basename "$d")
            echo "Packaging $name"
            tar -c -f "pkg/${name}.pkg.tar" -C pkg "$name"
            zstd -f "pkg/${name}.pkg.tar"
          done

      - name: Extract msys-2.0.dll
        shell: msys2 {0}
        run: |
          cd msys2-runtime
          pkgfile=$(ls pkg | grep -E '^msys2-runtime(.*)pkg.tar' | grep -v devel | head -n 1)
          tar -xf "pkg/$pkgfile"
          cp msys2-runtime/usr/bin/msys-2.0.dll "$GITHUB_WORKSPACE/"

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: msys2-runtime-dll
          path: msys-2.0.dll
